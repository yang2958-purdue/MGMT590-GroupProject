appId: com.jobbot.app
productName: JobBot
directories:
  output: dist
files:
  - dist-electron/**/*
  - out/**/*
extraResources:
  - source: backend
    destination: backend
    filter:
      - "**/*"
      - "!**/.venv/**"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
win:
  target: nsis
  signAndEditExecutable: false
mac:
  target: dmg
  category: public.app-category.productivity
linux:
  target: deb
